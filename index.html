<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maester Labs — by aiwithunnati</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div id="app">
  <video id="webcam" playsinline autoplay muted></video>
  <canvas id="overlayCanvas"></canvas>

  <div class="hud-top">
    <div class="brand">MAESTER<span>LABS</span></div>
    <div class="gesture-pill">
      <span id="gestureIcon">✋</span>
      <span id="gestureLabel">show your hand</span>
    </div>
  </div>

  <div id="slideCounter" class="slide-counter hidden">
    <span id="slideNum">1</span> / <span id="slideTotal">1</span>
  </div>

  <div id="loadingOverlay">
    <div class="loader-text" id="loaderText">loading hand tracking…</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
    <button id="loaderRetry" class="retry-btn hidden">retry</button>
  </div>

  <div id="recIndicator" class="rec-indicator hidden">
    <span class="rec-dot"></span> REC
  </div>

  <div class="controls">
    <button id="recordBtn" class="ctrl-btn" title="Record">⏺</button>
    <button id="fullscreenBtn" class="ctrl-btn" title="Fullscreen">⛶</button>
  </div>

  <div class="gesture-guide">
    <div class="g-item"><span class="g-icon">🖐</span> show content</div>
    <div class="g-item"><span class="g-icon">👊</span> clear</div>
    <div class="g-item"><span class="g-icon">👈</span> prev</div>
    <div class="g-item"><span class="g-icon">👉</span> next</div>
    <div class="g-item"><span class="g-icon">✌️</span> compare</div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
